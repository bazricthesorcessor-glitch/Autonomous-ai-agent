<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Avril WhatsApp Setup</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        #qrcode img { border: 10px solid white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        button { padding: 12px 24px; cursor: pointer; background: #25D366; color: white; border: none; font-size: 16px; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #128C7E; }
        ul { list-style: none; padding: 0; max-width: 500px; margin: 20px auto; text-align: left; }
        li {
            background: white;
            margin: 8px auto;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        li:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .group-name { font-weight: bold; font-size: 18px; color: #333; }
        .group-id { font-size: 12px; color: #999; font-family: monospace; }
        .header { color: #333; }
    </style>
</head>
<body>

    <div id="setup-phase">
        <h1 class="header">Step 1: Connect</h1>
        <div id="qrcode"><p style="color:#666">Waiting for QR Code...</p></div>
        <div id="status"></div>
    </div>

    <div id="chat-selection" class="hidden">
        <h1 class="header">Step 2: Select Chat</h1>
        <p>Choose the group you want Avril to monitor:</p>
        <button onclick="loadChats()">Load Chats</button>
        <ul id="chat-list"></ul>
    </div>

    <div id="completion" class="hidden">
        <h1 style="color: #25D366;">✅ Connected!</h1>
        <p>Bot is active. Send a message to the selected chat.</p>
        <div id="active-chat-display" style="margin-top: 20px; font-weight: bold; color: #333;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('qr', (src) => {
            document.getElementById('qrcode').innerHTML = `<img src="${src}" />`;
            document.getElementById('status').innerText = "Scan with WhatsApp > Linked Devices";
        });

        socket.on('connected', (msg) => {
            document.getElementById('setup-phase').classList.add('hidden');
            document.getElementById('chat-selection').classList.remove('hidden');
            document.getElementById('status').innerText = msg;
        });

        function loadChats() {
            socket.emit('get-chats');
        }

        socket.on('chat-list', (chats) => {
            const list = document.getElementById('chat-list');
            list.innerHTML = '';

            if (!chats || chats.length === 0) {
                list.innerHTML = '<li style="justify-content:center; color:red">No groups found</li>';
                return;
            }

            chats.forEach(chat => {
                // Get Name or fallback
                const name = chat.subject || "Private Chat";
                const idShort = chat.id.split('@')[0];

                const li = document.createElement('li');

                li.innerHTML = `
                    <span class="group-name">${name}</span>
                    <span class="group-id">${idShort}</span>
                `;

                li.onclick = () => selectChat(chat.id, name);
                list.appendChild(li);
            });
        });

        function selectChat(id, name) {
            if(confirm(`Start monitoring: ${name}?`)) {
                socket.emit('select-chat', id);
            }
        }

        socket.on('setup-complete', (msg) => {
            document.getElementById('chat-selection').classList.add('hidden');
            document.getElementById('completion').classList.remove('hidden');
            document.getElementById('active-chat-display').innerText = `Monitoring: ${msg}`;
        });
    </script>
</body>
</html>
